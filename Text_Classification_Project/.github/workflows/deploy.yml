name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'flask_app.py'
      - 'streamlit_app.py'
      - 'requirements_deployment.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Cloud Run (if secrets configured)
      if: ${{ secrets.GCP_PROJECT_ID != '' }}
      run: |
        echo "Deploying to Google Cloud Run..."
        # Add your cloud deployment commands here
        # gcloud run deploy text-classification-api ...

    - name: Deploy to AWS (if secrets configured)
      if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      run: |
        echo "Deploying to AWS..."
        # Add your AWS deployment commands here
        # aws elasticbeanstalk create-environment ...

    - name: Notify Slack
      if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
      uses: slackapi/slack-github-action@v1.24.0
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        payload: |
          {
            "text": "Deployment ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Deployment ${{ job.status }}*\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                }
              }
            ]
          }
